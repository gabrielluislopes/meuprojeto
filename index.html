<!DOCTYPE html>
<html lang="pt-br" dir="ltr">
  <head>
    <meta http-equiv="content-type" content="text/html" charset="utf-8">
    <title>Modelo de Caixa</title>
    <style type="text/css" media="screen">
      .caixagrande{
        height: 500px;
        width: 500px;
        border: 50px solid red;
        margin: 10px auto 50px auto;
        background-color: blue;
      }
      .caixapequena{
        height: 175px;
        width: 175px;
        border-left: 175px solid green;
        border-top: 175px solid green;
        margin-left: 75px;
        margin-top: 75px;
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div class="caixagrande">
      <div class="caixapequena">
        <div class="caixamenor">
        </div>
      </div>
    </div>
  </body>
</html>
